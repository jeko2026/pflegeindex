# PflegeIndex canonical-host rules for the hosting nginx configuration.
# Apply these directives in the corresponding vhosts; this file is not loaded
# automatically by Laravel or included in the public-webroot archive.

# HTTP vhost for both names:
server {
    listen 80;
    server_name pflegeindex.com www.pflegeindex.com;

    return 301 https://pflegeindex.com$request_uri;
}

# HTTPS redirect-only vhost for www. Keep the hosting provider's existing TLS
# certificate directives in this block.
server {
    listen 443 ssl;
    server_name www.pflegeindex.com;

    # ssl_certificate and ssl_certificate_key remain provider-managed.
    return 301 https://pflegeindex.com$request_uri;
}

# The primary HTTPS vhost must use server_name pflegeindex.com and serve the
# PflegeIndex public webroot without an additional canonical-host redirect.
