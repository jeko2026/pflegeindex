# Include these location blocks inside the canonical HTTPS
# pflegeindex.com server block. Do not include them in redirect-only vhosts.

location ~* \.(?:css|js)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location ~* \.(?:svg|png)$ {
    add_header Cache-Control "public, max-age=2592000" always;
    try_files $uri =404;
}
